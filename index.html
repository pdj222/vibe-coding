<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>할 일 목록</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 우측 상단 고정 시계 (app.js의 updateClock에서 값 갱신) -->
  <div class="clock-box">
    <div id="time">--:--:--</div>
    <div id="date">-</div>
  </div>

  <div class="todo-app">
    <h1>할 일 목록</h1>
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="할 일을 입력하세요" autocomplete="off">
      <button type="submit">추가</button>
    </form>
    <ul id="todo-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
